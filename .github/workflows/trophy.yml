name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch:       # lets you trigger it manually anytime

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy image
        uses: ryo-ma/github-profile-trophy-action@v0.1.0
        with:
          username: Tejash-TS
          theme: tokyonight
          column: 7
          row: 1
          margin-w: 15
          margin-h: 15
          output: trophy.svg

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trophy image"
          git push
